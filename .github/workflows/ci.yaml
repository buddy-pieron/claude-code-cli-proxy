name: CI  # ワークフローの名前

# 1. どのタイミングで動かすかを指定する（PushとPR）
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # テストを実行する「ジョブ」を定義
  test-job:
    # 2. 動かす環境（OS）を指定する
    runs-on: ubuntu-latest

    steps:
    # checkout the repository code
    - name: Checkout code
      uses: actions/checkout@v4

    # install several version of python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version:|
          3.10 
          3.11
          3.12
          3.13

    # install reuquirements 
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    # tests on spesific python version 
    - name: Run tests on python 3.10 ver
      run: python3.10 pytest tests/ -v 

    - name: Run tests on python 3.11 ver
      run: python3.11 pytest tests/ -v 

    - name: Run tests on python 3.12 ver
      run: python3.12 pytest tests/ -v 

    - name: Run tests on python 3.13 ver
      run: python3.13 pytest tests/ -v 

